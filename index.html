<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Voice Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>English Voice Chat</h1>
    <p class="subtitle">Talk to practice your English</p>

    <div class="controls">
      <button id="startBtn">🎤 Start Talking</button>
      <button id="stopBtn">⏹ Stop</button>
    </div>

    <div class="panel">
      <h2>You said</h2>
      <p id="userText">...</p>
    </div>

    <div class="panel">
      <h2>Assistant</h2>
      <p id="botText">Hello! Click start and talk to me in English.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
